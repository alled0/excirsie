version: "3.9"

services:

  model-service:
    build:
      context: ..
      dockerfile: web/model-service/Dockerfile
    ports:
      - "8081:8081"
    restart: unless-stopped

  backend:
    build:
      context: backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - MODEL_SERVICE_URL=http://model-service:8081
    depends_on:
      - model-service
    volumes:
      - backend-data:/app/data
    restart: unless-stopped

  frontend:
    image: nginx:alpine
    ports:
      - "4200:80"
    volumes:
      - ./frontend/dist/formcheck:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./runtime-config.docker.json:/usr/share/nginx/html/assets/runtime-config.json:ro
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend-data:
