# Demo Cloud Run profile - no Cloud SQL, no persistent database.
# Activate with: SPRING_PROFILES_ACTIVE=demo.
#
# This is intentionally for free-first demos only. Data is stored in memory and
# can reset whenever Cloud Run starts a new container or scales to zero.

spring.datasource.url=jdbc:h2:mem:taharrak_demo;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=false

model.service.url=${MODEL_SERVICE_URL:http://localhost:8081}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:*}
