server.port=${PORT:8080}

# ── Python model service ──────────────────────────────────────────────────────
model.service.url=http://localhost:8081

# ── File upload limits ────────────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB

# ── Local development database (H2) ──────────────────────────────────────────
# To reset: delete data/workout-dev.mv.db then restart.
# To switch to PostgreSQL locally, set SPRING_PROFILES_ACTIVE=prod and
# provide DB_URL, DB_USER, DB_PASS environment variables.
spring.datasource.url=jdbc:h2:file:./data/workout-dev;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Flyway manages all schema changes via versioned migration files
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# H2 console at /h2-console — disable in production profile
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
