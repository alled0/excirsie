# Production profile — PostgreSQL, no H2 console
# Activate with: SPRING_PROFILES_ACTIVE=prod
# Required env vars: DB_URL, DB_USER, DB_PASS, MODEL_SERVICE_URL

spring.datasource.url=${DB_URL}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASS}

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.h2.console.enabled=false

model.service.url=${MODEL_SERVICE_URL:http://model-service:8081}

app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:*}
